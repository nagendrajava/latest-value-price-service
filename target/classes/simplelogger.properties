# Show log level (INFO, DEBUG, TRACE, WARN, ERROR)
org.slf4j.simpleLogger.defaultLogLevel=DEBUG

# Display the date and time along with the log message
org.slf4j.simpleLogger.showDateTime=true

# Date format for the timestamp
org.slf4j.simpleLogger.dateTimeFormat=yyyy-MM-dd HH:mm:ss:SSS Z

# Optionally show the thread name that caused the log
org.slf4j.simpleLogger.showThreadName=true

# Show the logger named (the class emitting the log)
org.slf4j.simpleLogger.showLogName=true

# You can configure specific class levels like this if you want more verbosity for only your app later:
# org.slf4j.simpleLogger.log.com.assignment.price=DEBUG
